# Kalau container ini di belakang reverse-proxy HTTPS (nginx/Caddy/Cloudflare
# di depan yang meneruskan ke sini via HTTP biasa), proxy tsb mengirim header
# X-Forwarded-Proto: https. Nginx di dalam container sendiri tidak pernah tahu
# koneksi aslinya HTTPS, jadi map header itu ke variabel HTTPS untuk PHP supaya
# Laravel membuat URL https:// (bukan http://) dan tidak kena Mixed Content.
map $http_x_forwarded_proto $fastcgi_https {
    default '';
    https 'on';
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # Izinkan file besar untuk hasil download video
    client_max_body_size 2048M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Nginx terbaru meneruskan HTTP_HOST dari $host (selalu tanpa port) demi
        # keamanan terhadap proxy berlapis. Container ini adalah edge server
        # tunggal yang langsung menerima koneksi dari port mapping Docker, jadi
        # aman memakai $http_host (header asli klien) agar port publik (mis.
        # :8000 di VPS) tetap terbawa saat Laravel membangun URL absolut.
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTPS $fastcgi_https if_not_empty;

        # Download yt-dlp bisa berjalan lama (sampai 300 detik di aplikasi)
        fastcgi_read_timeout 900;
        fastcgi_send_timeout 900;
        fastcgi_buffering off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
