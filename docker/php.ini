; Konfigurasi PHP untuk container aplikasi
memory_limit = 512M

; Proses download bisa lama; batasi lewat Process::timeout() di aplikasi, bukan PHP
max_execution_time = 0
max_input_time = 0

; Tidak ada upload, tapi disamakan supaya aman
upload_max_filesize = 64M
post_max_size = 64M

; OPcache untuk performa
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 60

expose_php = Off
